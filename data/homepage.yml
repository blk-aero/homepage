products:
  - title: "Ortofoto"
    img: "assets/img/orthophoto.gif"
    text: >
      Imagens aéreas georreferenciadas de alta precisão
      <br />
      <br />
      Medições <span class="text-green">precisas</span> e inspeções com imagens
      detalhadas tornam o planejamento e execução de projetos mais eficientes,
      diminuindo visitas ao local e <span class="text-green">retrabalho</span>

  - title: "Nuvem de Pontos"
    img: "assets/img/point-cloud.gif"
    text: >
      Detalhamento preciso do ambiente
      <br />
      <br />
      Captura <span class="text-green">detalhes finos</span> do terreno e
      estruturas, fundamental para análises em mineração e geoprocessamento,
      aumentando <span class="text-green">precisão</span> e segurança em projetos

  - title: "Modelo Digital de Terreno / Curvas de Nível"
    img: "assets/img/digital-terrain-model.jpg"
    text: >
      Representação detalhada do relevo
      <br />
      <br />
      Essencial para entender <span class="text-green">variações do terreno</span>,
      facilitando projetos de drenagem e análises de risco
      <br />
      Fundamental no <span class="text-green">planejamento urbano e infraestrutura</span>

  - title: "Mapas 3D"
    img: "assets/img/gif-odm.gif"
    text: >
      Visualização imersiva e detalhada
      <br />
      <br />
      Nossos mapas 3D trazem realismo aos projetos, facilitando a vetorização e
      criação de <span class="text-green">"Digital Twins"</span>
      <br />
      Indispensáveis para avanços em engenharia e arquitetura


  - title: "Variação de Volume"
    img: "assets/img/volume-delta.gif"
    text: >
      Controle e eficiência de recursos
      <br />
      <br />
      Suporta <span class="text-green">decisões estratégicas</span> em áreas
