# About
about:
  title: >
    Transforme complexidade em simplicidade,
    <br />
    garanta rapidez e superioridade em seus projetos

  desc: >
    Oferecemos soluções rápidas e econômicas que combinam levantamento 
    topográfico tradicional com tecnologia de drones.
    <br />
    <br />
    Nossos produtos (serviço+plataforma) melhoram a colaboração e a tomada de 
    decisões, proporcionando uma visão detalhada e auditável do terreno.
    <br />
    <br />
    Categoria "A" em Aerolevantamento pelo Ministério da Defesa

  button:
    enable: true
    text: "Produtos"
    url: "#products"

intro:
  title: "Aerolevantamento"
  videoID: "kLgHqpITECU"
  text: >
    Mapeamos a sua area, trazendo mais visibilidade e precisão para o seu projeto.

