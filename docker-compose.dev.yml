services:
  hugo:
    image: klakegg/hugo:ext                  # extended edition with SCSS/WebP support
    container_name: hugo_server
    ports:
      - "1313:1313"                           # host → container
    volumes:
      - ./:/src                              # mount current dir into /src
    command: >
      server                                  # ENTRYPOINT is already “hugo”
      --bind=0.0.0.0                          # listen on all interfaces
      --disableFastRender                    # ensure full rebuilds
      --watch                                 # explicitly enable watchers
      --poll=700ms                           # fallback polling
      -D                                     # include drafts
