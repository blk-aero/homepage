<head>
    {{ with .Site.Params.googleTagManager }}
  
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','{{ . }}');</script>
    <!-- End Google Tag Manager -->
  
    {{ end }}

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    {{ $title := print .Site.Title " | " .Title }}
    {{ if .IsHome }}{{ $title = .Site.Title }}{{ end }}
    <title>{{ $title }}</title>
    <meta name="description" content="{{ .Site.Params.description }}" />
    <link rel="canonical" href="{{ .Site.Params.canonical }}" />
    <link rel="icon" href="{{ site.Params.favicon }}" />

    <!-- Font Awesome icons (free version)-->
    <script src="https://use.fontawesome.com/releases/v6.1.0/js/all.js" crossorigin="anonymous"></script>
    <!-- Google fonts-->
    <link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet" />
    <!-- Core theme CSS (includes Bootstrap)-->
    <link href="css/styles.css" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "{{ .Site.Params.name }}",
      "url": "{{ .Site.Params.canonical }}",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "{{ .Site.Params.businessAddres }}",
        "addressLocality": "{{ .Site.Params.addressLocality }}",
        "addressRegion": "{{ .Site.Params.addressRegion }}",
        "postalCode": "{{ .Site.Params.postalCode }}"
      },
      "telephone": "{{ .Site.Params.telephone }}",
      "email": "{{ .Site.Params.email }}"
    }
    </script>
</head>
